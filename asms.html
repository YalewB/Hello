<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous SMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>School Management System</h1>
            <p>Autonomous Data Handling (Local Storage)</p>
        </header>

        <section class="form-container">
            <div class="card">
                <h3>Add New Student</h3>
                <input type="text" id="stuName" placeholder="Student Name">
                <input type="text" id="stuID" placeholder="ID Number">
                <button onclick="addStudent()">Register Student</button>
            </div>

            <div class="card">
                <h3>Record Grade</h3>
                <select id="stuSelect"></select>
                <input type="number" id="stuGrade" placeholder="Grade (0-100)">
                <button onclick="submitGrade()">Update Grade</button>
            </div>
        </section>

        <section class="display-container">
            <h3>Student Directory</h3>
            <table id="studentTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Grade</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
